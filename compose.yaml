services:
  # ── ddrive (S3 backend) ────────────────────────────────
  postgres:
    image: docker.io/library/postgres:18-alpine
    shm_size: 128m
    volumes:
      - ddrive_pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ddrive
      POSTGRES_DB: ddrive
      POSTGRES_PASSWORD: ddrive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddrive"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ddrive:
    build:
      context: ./ddrive
      dockerfile: docker/Dockerfile
    volumes:
      - ./webhook.txt:/app/webhook.txt:ro
    environment:
      NODE_ENV: docker
      DATABASE_URL: postgres://ddrive:ddrive@postgres:5432/ddrive
      S3_ACCESS_KEY_ID: ddrive
      S3_SECRET_ACCESS_KEY: ddrive-secret
      S3_BUCKET: ddrive
      UPLOAD_CONCURRENCY: ${UPLOAD_CONCURRENCY:-5}
      SECRET: ${DDRIVE_ENCRYPT_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Gokapi (frontend) ─────────────────────────────────
  gokapi:
    build:
      context: ./Gokapi
    ports:
      - "${GOKAPI_PORT:-53842}:53842"
    volumes:
      - gokapi_data:/app/data
      - gokapi_config:/app/config
    environment:
      TZ: ${TZ:-UTC}
      GOKAPI_AWS_BUCKET: ddrive
      GOKAPI_AWS_REGION: us-east-1
      GOKAPI_AWS_KEY: ddrive
      GOKAPI_AWS_KEY_SECRET: ddrive-secret
      GOKAPI_AWS_ENDPOINT: http://ddrive:3000
      GOKAPI_AWS_PROXY_DOWNLOAD: "true"
      GOKAPI_DISABLE_CORS_CHECK: "true"
      GOKAPI_USE_CLOUDFLARE: ${GOKAPI_USE_CLOUDFLARE:-false}
    depends_on:
      ddrive:
        condition: service_healthy
    restart: unless-stopped

  # ── cloudflared (reverse proxy) ─────────────────────────────
  cloudflared:
    profiles: [cloudflare]
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    restart: unless-stopped

volumes:
  ddrive_pgdata:
  gokapi_data:
  gokapi_config:
